<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Auntie! 🎂</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@900&family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      background: #020202;
      cursor: crosshair;
      overflow: hidden;
    }

    canvas { display: block; }

    /* ── Text block ─────────────────────────────────────── */
    .text-container {
      position: absolute;
      top: 32%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      user-select: none;
      pointer-events: none; 
      z-index: 1;
    }

    h1 {
      margin: 0;
      color: #fff;
      font-family: "Source Sans 3", "Source Sans Pro", sans-serif;
      font-size: clamp(2rem, 9vw, 5rem);
      font-weight: 900;
      letter-spacing: 0.02em;
      animation: glowPulse 3s ease-in-out infinite;
    }

    /* ── "Auntie" — script font + shimmer ──────────────── */
    .name {
      display: block;
      font-family: "Great Vibes", cursive;
      font-size: clamp(2.2rem, 8vw, 4rem);
      font-weight: 400;
      margin-top: 0.05em;
      background: linear-gradient(
        90deg,
        #ffd700,
        #ffb347,
        #ff69b4,
        #da70d6,
        #a78bfa,
        #ffd700
      );
      background-size: 300% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 5s linear infinite;
      filter: drop-shadow(0 0 10px rgba(255, 170, 80, 0.45));
    }

    /* ── Animations ─────────────────────────────────────── */
    @keyframes glowPulse {
      0%, 100% {
        text-shadow:
          0 0 8px  rgba(255, 255, 255, 0.35),
          0 0 30px rgba(220, 160, 255, 0.25),
          0 0 60px rgba(160,  80, 255, 0.12);
      }
      50% {
        text-shadow:
          0 0 18px rgba(255, 255, 255, 0.65),
          0 0 55px rgba(255, 110, 255, 0.40),
          0 0 100px rgba(200,  50, 255, 0.28);
      }
    }

    @keyframes shimmer {
      0%   { background-position:   0% center; }
      100% { background-position: 300% center; }
    }

    /* ── Hint text ──────────────────────────────────────── */
    .hint {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      margin: 0;
      color: rgba(255, 255, 255, 0.9);
      font-family: "Source Sans 3", sans-serif;
      font-size: 1rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      pointer-events: none;
      white-space: nowrap;
      animation: fadeHint 3s ease-out 2.5s both, hintGlow 2.5s ease-in-out 5s infinite;
      text-shadow:
        0 0 8px  rgba(255, 200, 255, 0.9),
        0 0 20px rgba(220, 150, 255, 0.7),
        0 0 40px rgba(180,  80, 255, 0.4);
    }

    @keyframes fadeHint {
      from { opacity: 0; transform: translateX(-50%) translateY(8px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    @keyframes hintGlow {
      0%, 100% {
        text-shadow:
          0 0 8px  rgba(255, 200, 255, 0.9),
          0 0 20px rgba(220, 150, 255, 0.7),
          0 0 40px rgba(180,  80, 255, 0.4);
      }
      50% {
        text-shadow:
          0 0 12px rgba(255, 220, 255, 1.0),
          0 0 35px rgba(255, 120, 255, 0.9),
          0 0 70px rgba(200,  50, 255, 0.6);
      }
    }
  </style>
</head>
<body>

  <div class="text-container">
    <h1>Happy Birthday</h1>
    <span class="name">Auntie</span>
  </div>

  <canvas id="birthday"></canvas>

  <p class="hint">✨ tap anywhere ✨</p>

  <script>
    const PI2 = Math.PI * 2
    const random = (min, max) => Math.random() * (max - min + 1) + min | 0
    const timestamp = _ => new Date().getTime()

    class Birthday {
      constructor() {
        this.resize()
        this.fireworks = []
        this.counter = 0
      }

      resize() {
        this.width = canvas.width = window.innerWidth
        let center = this.width / 2 | 0
        this.spawnA = center - center / 4 | 0
        this.spawnB = center + center / 4 | 0

        this.height = canvas.height = window.innerHeight
        this.spawnC = this.height * .1
        this.spawnD = this.height * .5
      }

      onClick(evt) {
        let x = evt.clientX || evt.touches && evt.touches[0].pageX
        let y = evt.clientY || evt.touches && evt.touches[0].pageY

        let count = random(3, 5)
        for (let i = 0; i < count; i++) this.fireworks.push(new Firework(
          random(this.spawnA, this.spawnB),
          this.height,
          x,
          y,
          random(0, 260),
          random(30, 110)
        ))

        this.counter = -1
      }

      update(delta) {
        ctx.globalCompositeOperation = 'hard-light'
        ctx.fillStyle = `rgba(20,20,20,${7 * delta})`
        ctx.fillRect(0, 0, this.width, this.height)

        ctx.globalCompositeOperation = 'lighter'
        for (let firework of this.fireworks) firework.update(delta)

        this.counter += delta * 3
        if (this.counter >= 1) {
          this.fireworks.push(new Firework(
            random(this.spawnA, this.spawnB),
            this.height,
            random(0, this.width),
            random(this.spawnC, this.spawnD),
            random(0, 360),
            random(30, 110)
          ))
          this.counter = 0
        }

        if (this.fireworks.length > 1000)
          this.fireworks = this.fireworks.filter(f => !f.dead)
      }
    }

    class Firework {
      constructor(x, y, targetX, targetY, shade, offsprings) {
        this.dead = false
        this.offsprings = offsprings
        this.x = x
        this.y = y
        this.targetX = targetX
        this.targetY = targetY
        this.shade = shade
        this.history = []
      }

      update(delta) {
        if (this.dead) return

        let xDiff = this.targetX - this.x
        let yDiff = this.targetY - this.y
        if (Math.abs(xDiff) > 3 || Math.abs(yDiff) > 3) {
          this.x += xDiff * 2 * delta
          this.y += yDiff * 2 * delta
          this.history.push({ x: this.x, y: this.y })
          if (this.history.length > 20) this.history.shift()
        } else {
          if (this.offsprings && !this.madeChilds) {
            let babies = this.offsprings / 2
            for (let i = 0; i < babies; i++) {
              let targetX = this.x + this.offsprings * Math.cos(PI2 * i / babies) | 0
              let targetY = this.y + this.offsprings * Math.sin(PI2 * i / babies) | 0
              birthday.fireworks.push(new Firework(this.x, this.y, targetX, targetY, this.shade, 0))
            }
          }
          this.madeChilds = true
          this.history.shift()
        }

        if (this.history.length === 0) {
          this.dead = true
        } else if (this.offsprings) {
          for (let i = 0; i < this.history.length; i++) {
            let point = this.history[i]
            ctx.beginPath()
            ctx.fillStyle = 'hsl(' + this.shade + ',100%,' + i + '%)'
            ctx.arc(point.x, point.y, 1, 0, PI2, false)
            ctx.fill()
          }
        } else {
          ctx.beginPath()
          ctx.fillStyle = 'hsl(' + this.shade + ',100%,50%)'
          ctx.arc(this.x, this.y, 1, 0, PI2, false)
          ctx.fill()
        }
      }
    }

    let canvas = document.getElementById('birthday')
    let ctx = canvas.getContext('2d')
    let then = timestamp()

    let birthday = new Birthday()
    window.onresize = () => birthday.resize()
    document.onclick = evt => birthday.onClick(evt)
    document.ontouchstart = evt => birthday.onClick(evt)

    ;(function loop() {
      requestAnimationFrame(loop)
      let now = timestamp()
      let delta = now - then
      then = now
      birthday.update(delta / 1000)
    })()
  </script>

</body>
</html>
